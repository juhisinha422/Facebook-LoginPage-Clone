<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="icon"
      type="image/png"
      href="https://www.facebook.com/favicon.ico"
    />
    <title>Facebook - Log in or Sign up</title>
  </head>
  <body class="bg-gray-100">
    <div class="container mx-auto mt-24 flex flex-wrap justify-center items-start gap-12 px-4">
      
      <!-- Left Section -->
      <div class="left flex-1 min-w-[280px] max-w-md">
        <img
          class="w-60"
          src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png"
          alt="Facebook Logo"
        />
        <p class="text-3xl mt-6">
          Facebook helps you connect and share with the people in your life.
        </p>
      </div>

      <!-- Right Section -->
      <div class="right flex flex-col bg-white p-8 rounded-xl shadow-lg w-full sm:w-[400px] text-lg relative">
        
        <!-- Inputs -->
        <input
          class="px-4 h-12 my-2 border border-gray-300 rounded-lg outline-blue-600 focus:ring-2 focus:ring-blue-500"
          type="text"
          placeholder="Email address or Phone Number"
        />
        <input
          class="px-4 h-12 my-2 border border-gray-300 rounded-lg outline-blue-600 focus:ring-2 focus:ring-blue-500"
          type="password"
          placeholder="Password"
        />

        <!-- Log In Button -->
        <button
          class="bg-blue-600 hover:bg-blue-700 text-white my-2 py-3 rounded-md font-bold w-full"
        >
          Log In
        </button>

        <!-- Forgotten Password -->
        <span
          class="text-blue-600 text-center text-sm my-2 cursor-pointer hover:underline"
        >
          Forgotten Password?
        </span>

        <hr class="my-4 border-gray-300" />

        <!-- Create New Account -->
        <button
          class="bg-green-600 hover:bg-green-700 text-white py-3 rounded-md font-bold w-fit px-6 mx-auto"
        >
          Create New Account
        </button>

        <!-- Create a Page Text -->
        <p class="text-center text-sm mt-6">
          <span class="font-bold cursor-pointer hover:underline">Create a Page</span> 
          for a celebrity, brand or business.
        </p>
      </div>
    </div>
  </body>
</html>
