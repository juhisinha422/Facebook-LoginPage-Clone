<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="clone.css" />
    <link
      rel="icon"
      type="image/png"
      href="https://www.facebook.com/favicon.ico"
    />

    <title>Facebook- log in or sign up</title>
  </head>
  <body class="bg-gray-100">
    <!--Enhancing left container-->
    <div class="container mt-48 flex mx-auto items-center justify-center">
      <!--layout of the raw page-->
      <div class="left w-1/2 mx-14">
        <img
          class="w-60"
          src="https://static.xx.fbcdn.net/rsrc.php/y8/r/dF5SId3UHWd.svg"
        />
        <p class="text-3xl mx-8">
          Facebook helps you connect and share with the people in your life.
        </p>
      </div>

      <!--enhancing right container-->
      <div
        class="right flex flex-col bg-white p-8 rounded-xl w-1/3 text-lg relative"
      >
        <input
          class="px-4 h-12 my-2 border border-1 border-gray-200 outline-blue-600 rounded-lg"
          type="text"
          placeholder="Email address or Phone Number"
        />
        <input
          class="px-4 h-12 my-2 border rounded-lg border-1 border-gray-200 outline-blue-600"
          type="password"
          placeholder="Password"
        />
        <button
          class="bg-blue-600 hover:bg-blue-700 text-white my-2 py-3 rounded-md font-bold"
        >
          Log In
        </button>
        <span
          class="text-blue-600 text-center text-sm my-2 cursor-pointer hover:underline"
          >Forgotten Password</span
        >
        <hr class="my-2" />
        <button
          class="bg-green-600 hover:bg-green-700 text-white my-2 py-3 rounded-md font-bold w-fit px-4 mx-auto"
        >
          <span class="font-bold"></span>
          Create New Account
        </button>

        <span class="absolute -bottom-12 text-sm"
          ><span class="font-bold hover:underline cursor-pointer"
            >Create a Page</span
          >
          for a celebrity, brand or business.</span
        >
      </div>
    </div>
  </body>
</html>
